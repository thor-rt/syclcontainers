name: Docker

on:
  workflow_dispatch:
  schedule:
    - cron: '29 18 * * 0'  # Every Sunday at 18:29 UTC
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io

jobs:
  # Level 0: images with no in-repo image dependency.
  #   - adaptivecpp-toolchain : the shared LLVM/Clang/CMake build environment
  #   - intel-sycl-base       : Intel oneAPI base
  build-base:
    runs-on: ${{ contains(matrix.path, 'intel') && fromJSON('{"group":"Default","labels":"ubuntu-75gb"}') || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - path: adaptivecpp-toolchain
          - path: intel-sycl-base
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Free disk space for Intel builds
        if: contains(matrix.path, 'intel')
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.path }}

      - name: Build Docker image
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09
        with:
          context: ./${{ matrix.path }}
          load: true
          tags: ${{ matrix.path }}:test
          cache-from: type=gha,scope=${{ matrix.path }}
          cache-to: type=gha,scope=${{ matrix.path }},mode=max

      - name: Run tests
        run: |
          if [ "${{ matrix.path }}" = "intel-sycl-base" ]; then
            docker run --rm -v ${{ github.workspace }}/tests:/tests ${{ matrix.path }}:test \
              bash -c "source /opt/intel/oneapi/setvars.sh && /tests/run_tests.sh"
          elif [ "${{ matrix.path }}" = "adaptivecpp-toolchain" ]; then
            docker run --rm ${{ matrix.path }}:test bash -c "clang --version && cmake --version"
          fi

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20
        with:
          cosign-release: 'v2.2.4'

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09
        id: push
        with:
          context: ./${{ matrix.path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.path }}

      - name: Sign the published Docker image
        if: github.event_name != 'pull_request'
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          for tag in ${TAGS}; do
            cosign sign --yes ${tag}@${DIGEST}
          done

  # Level 1: adaptivecpp-runtime = toolchain + HPC libs (HDF5/OpenMPI/GMP/TBB).
  build-runtime:
    needs: build-base
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/adaptivecpp-runtime

      - name: Build and push Docker image
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09
        id: push
        with:
          context: ./adaptivecpp-runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TOOLCHAIN_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/adaptivecpp-toolchain:main
          cache-from: type=gha,scope=adaptivecpp-runtime
          cache-to: type=gha,scope=adaptivecpp-runtime,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20
        with:
          cosign-release: 'v2.2.4'

      - name: Sign the published Docker image
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          for tag in ${TAGS}; do
            cosign sign --yes ${tag}@${DIGEST}
          done

  # Level 2: images built on toolchain (builder stage) + runtime (final stage),
  # plus intel-sycl-hpc on intel-sycl-base. adaptivecpp-hpc-multigpu carries
  # both the CUDA and ROCm backends, so it pulls both vendor sources at build
  # time (the largest job) — it runs on the ubuntu-75gb runner with disk prune.
  build-hpc:
    needs: build-runtime
    if: github.event_name != 'pull_request'
    runs-on: ${{ (matrix.large || contains(matrix.path, 'intel')) && fromJSON('{"group":"Default","labels":"ubuntu-75gb"}') || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - path: adaptivecpp-base
            runtime: true
          - path: adaptivecpp-hpc-cuda
            runtime: true
            large: true
          - path: adaptivecpp-hpc-rocm
            runtime: true
            large: true
          - path: adaptivecpp-hpc-multigpu
            runtime: true
            large: true
          - path: intel-sycl-hpc
            base: intel-sycl-base
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Free disk space for large/Intel builds
        if: matrix.large || contains(matrix.path, 'intel')
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.path }}

      - name: Build Docker image
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09
        with:
          context: ./${{ matrix.path }}
          load: true
          tags: ${{ matrix.path }}:test
          build-args: |
            ${{ matrix.base != '' && format('BASE_IMAGE={0}/{1}/{2}:main', env.REGISTRY, github.repository_owner, matrix.base) || '' }}
            ${{ matrix.runtime && format('TOOLCHAIN_IMAGE={0}/{1}/adaptivecpp-toolchain:main', env.REGISTRY, github.repository_owner) || '' }}
            ${{ matrix.runtime && format('RUNTIME_IMAGE={0}/{1}/adaptivecpp-runtime:main', env.REGISTRY, github.repository_owner) || '' }}
          cache-from: type=gha,scope=${{ matrix.path }}
          cache-to: type=gha,scope=${{ matrix.path }},mode=max

      - name: Run tests
        run: |
          if [ "${{ matrix.path }}" = "intel-sycl-hpc" ]; then
            docker run --rm -v ${{ github.workspace }}/tests:/tests ${{ matrix.path }}:test \
              bash -c "source /opt/intel/oneapi/setvars.sh && /tests/run_tests.sh"
          else
            # AdaptiveCpp images: GHA runners have no GPU, so run_tests.sh
            # exercises the CPU backend (always present) via the acpp default device.
            docker run --rm -v ${{ github.workspace }}/tests:/tests ${{ matrix.path }}:test \
              bash -c "/tests/run_tests.sh"
          fi

      - name: Install cosign
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20
        with:
          cosign-release: 'v2.2.4'

      - name: Push Docker image
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09
        id: push
        with:
          context: ./${{ matrix.path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ${{ matrix.base != '' && format('BASE_IMAGE={0}/{1}/{2}:main', env.REGISTRY, github.repository_owner, matrix.base) || '' }}
            ${{ matrix.runtime && format('TOOLCHAIN_IMAGE={0}/{1}/adaptivecpp-toolchain:main', env.REGISTRY, github.repository_owner) || '' }}
            ${{ matrix.runtime && format('RUNTIME_IMAGE={0}/{1}/adaptivecpp-runtime:main', env.REGISTRY, github.repository_owner) || '' }}
          cache-from: type=gha,scope=${{ matrix.path }}

      - name: Sign the published Docker image
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          for tag in ${TAGS}; do
            cosign sign --yes ${tag}@${DIGEST}
          done

  # Level 3: adaptivecpp-hpc thin alias of adaptivecpp-base (backward compat).
  build-alias:
    needs: build-hpc
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/adaptivecpp-hpc

      - name: Build and push Docker image
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09
        id: push
        with:
          context: ./adaptivecpp-hpc
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/adaptivecpp-base:main
          cache-from: type=gha,scope=adaptivecpp-hpc
          cache-to: type=gha,scope=adaptivecpp-hpc,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20
        with:
          cosign-release: 'v2.2.4'

      - name: Sign the published Docker image
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          for tag in ${TAGS}; do
            cosign sign --yes ${tag}@${DIGEST}
          done
